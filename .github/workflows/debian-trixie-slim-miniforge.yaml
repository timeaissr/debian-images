name: Build debian:trixie-slim-mf

on:
  push:
    branches: [ "main" ]
    paths:
      - 'debian-trixie-slim-miniforge/**'      # 目录名可不变，或改为 trixie-slim-miniforge
      - '.github/workflows/debian-trixie-slim-miniforge.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: debian

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Normalize repository owner
        shell: bash
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=trixie-slim-mf
            type=sha,prefix=trixie-slim-mf-
            type=raw,value=trixie-slim-miniforge
            type=sha,prefix=trixie-slim-miniforge-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./debian-trixie-slim-miniforge   # 上下文路径和目录名保持一致
          file: ./debian-trixie-slim-miniforge/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}