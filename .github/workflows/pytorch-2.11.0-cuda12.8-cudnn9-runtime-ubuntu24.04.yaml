name: Build pytorch:2.11.0-cuda12.8-cudnn9-runtime-ubuntu24.04

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pytorch/2.11.0-cuda12.8-cudnn9-runtime-ubuntu24.04/**'
      - '.github/workflows/pytorch-2.11.0-cuda12.8-cudnn9-runtime-ubuntu24.04.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pytorch
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=2.11.0-cuda12.8-cudnn9-runtime-ubuntu24.04
            type=sha,prefix=2.11.0-cuda12.8-cudnn9-runtime-ubuntu24.04-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./pytorch/2.11.0-cuda12.8-cudnn9-runtime-ubuntu24.04
          file: ./pytorch/2.11.0-cuda12.8-cudnn9-runtime-ubuntu24.04/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}