name: Build trixie-slim

on:
  push:
    branches: [ "main" ]
    # 👇 监听路径改为 slim 文件夹
    paths:
      - 'trixie-slim/**'
      - '.github/workflows/build-trixie-slim.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: trixie-slim  # 改成 slim

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./trixie-slim
          file: ./trixie-slim/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ toLower(github.repository_owner) }}/${{ env.IMAGE_NAME }}:latest