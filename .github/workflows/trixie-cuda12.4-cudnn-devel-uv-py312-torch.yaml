name: Build debian:trixie-cuda12.4-cudnn-devel-uv-py312-torch

on:
  push:
    branches: [ "main" ]
    paths:
      - 'trixie-cuda12.4-cudnn-devel-uv-py312-torch/**'
      - '.github/workflows/trixie-cuda12.4-cudnn-devel-uv-py312-torch.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: debian            # 仓库名统一为 debian

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize repository owner
        shell: bash
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=trixie-cuda12.4-cudnn-devel-uv-py312-torch
            type=raw,value=13-cuda12.4-cudnn-devel-uv-py312-torch
            type=sha,prefix=trixie-cuda12.4-cudnn-devel-uv-py312-torch-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./trixie-cuda12.4-cudnn-devel-uv-py312-torch
          file: ./trixie-cuda12.4-cudnn-devel-uv-py312-torch/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}