name: Build debian:trixie-slim-mf

on:
  push:
    branches: [ "main" ]
    paths:
      - 'trixie-slim-miniforge/**'
      - '.github/workflows/trixie-slim-miniforge.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: debian
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Removed normalization step — IMAGE_OWNER comes from GitHub context

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=trixie-slim-mf
            type=raw,value=13-slim-mf
            type=sha,prefix=trixie-slim-mf-
            type=raw,value=trixie-slim-miniforge
            type=raw,value=13-slim-miniforge
            type=sha,prefix=trixie-slim-miniforge-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./trixie-slim-miniforge
          file: ./trixie-slim-miniforge/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}